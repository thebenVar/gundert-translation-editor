name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nextjs-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run default tests
        run: npm test

      - name: Run DB integration tests (when Neon secret is present)
        if: ${{ secrets.POSTGRES_URL_NON_POOLING != '' }}
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          RUN_DB_INTEGRATION_TESTS: "true"
        run: |
          npm run db:push
          npm run test:db
